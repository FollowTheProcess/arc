version: 2

project_name: arc

before:
  hooks:
    - go mod tidy

gomod:
  proxy: true

report_sizes: true

builds:
  - main: "./cmd/arc"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X go.followtheprocess.codes/arc/internal/cmd.version={{.Version}}
      - -X go.followtheprocess.codes/arc/internal/cmd.commit={{.Commit}}
      - -X go.followtheprocess.codes/arc/internal/cmd.date={{.CommitDate}}
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
      - freebsd
      - openbsd
      - netbsd
    goarch:
      - amd64
      - arm64
      - "386"
      - arm
    goarm:
      - "7"

homebrew_casks:
  - name: arc
    binaries:
      - arc
    directory: Casks
    description: A command line API Client and testing tool, driven by plaintext .http files
    homepage: https://github.com/FollowTheProcess/arc
    commit_author:
      name: Tom Fleet
      email: me@followtheprocess.codes
    repository:
      owner: FollowTheProcess
      name: homebrew-tap
      token: "{{.Env.HOMEBREW_TAP_TOKEN}}"
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status.zero?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/arc"]
          end

dockers_v2:
  - images:
      - followtheprocess/arc
      - ghcr.io/followtheprocess/arc
    tags:
      - "{{ .Version }}"
    labels:
      "org.opencontainers.image.description": "A command line API Client and testing tool, driven by plaintext .http files"
      "org.opencontainers.image.created": "{{.CommitDate}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"

docker_digest:
  name_template: digests.txt

archives:
  - name_template: >-
      {{ .ProjectName }}-
      {{- .Version }}-
      {{- .Os }}-
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

sboms:
  - artifacts: archive
    documents:
      - >-
        {{ .ProjectName }}-
        {{- .Version }}-
        {{- .Os }}-
        {{- if eq .Arch "amd64" }}x86_64
        {{- else if eq .Arch "386" }}i386
        {{- else }}{{ .Arch }}{{ end }}.sbom

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Tag }}-dev{{ .ShortCommit }}"

changelog:
  # The changelog is handled by release drafter
  disable: true
